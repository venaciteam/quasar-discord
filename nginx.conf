server {
    listen       80;
    server_name  localhost;
    root   /usr/share/nginx/html;
    index  index.html;

    # ── Actifs statiques mutables (JS, CSS) ──────────────────────
    # Le navigateur revalide à chaque visite grâce à no-cache + ETag.
    # Si le fichier n'a pas changé → 304 (pas de re-téléchargement).
    # Si le fichier a changé → 200 avec la nouvelle version.
    location ~* \.(js|css)$ {
        etag on;
        add_header Cache-Control "no-cache";
    }

    # ── Actifs statiques immutables (images, polices, icônes) ────
    # Rarement modifiés → cache long (7 jours).
    location ~* \.(png|jpg|jpeg|gif|ico|svg|woff2?|ttf|eot)$ {
        etag on;
        add_header Cache-Control "public, max-age=604800";
    }

    # ── HTML ─────────────────────────────────────────────────────
    # Toujours revalider pour que l'utilisateur charge les bons JS/CSS.
    location ~* \.html$ {
        etag on;
        add_header Cache-Control "no-cache";
    }

    # ── Fallback SPA ─────────────────────────────────────────────
    location / {
        try_files $uri $uri/ /index.html;
    }
}
