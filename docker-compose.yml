services:
  quasar:
    build: .
    container_name: quasar
    restart: unless-stopped
    ports:
      - "${PORT:-3050}:${PORT:-3050}"
    volumes:
      - quasar-data:/app/data
      - /var/run/docker.sock:/var/run/docker.sock
      - .:/host-app
    env_file: .env
    environment:
      - QUASAR_HOST_DIR=/host-app
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

volumes:
  quasar-data:
    external: true
