<!DOCTYPE html>
<html lang="fr" data-accent="rose">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Atom — Connexion</title>
    <link rel="stylesheet" href="/dashboard/css/style.css">
    <link rel="stylesheet" href="/dashboard/css/vnct-fab-only.css">
    <link rel="icon" type="image/x-icon" href="/dashboard/icon.ico">
    <link rel="icon" type="image/png" href="/dashboard/icon.png">
    <link rel="apple-touch-icon" href="/dashboard/icon.png">
    <link rel="manifest" href="/dashboard/manifest.json">
    <meta name="theme-color" content="#c86e8e">
</head>
<body>
    <div class="landing" id="landing">
        <div class="landing-top">
            <button class="theme-toggle" onclick="toggleTheme()" aria-label="Changer de theme">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/></svg>
            </button>
        </div>
        <div class="landing-logo"><img src="/dashboard/img/atom-symbol.png" class="atom-logo-icon" alt=""> Atom</div>
        <p class="landing-subtitle">Connecte-toi pour acceder au dashboard</p>

        <a href="/auth/login" class="landing-btn">
            <img src="/dashboard/img/discord-logo.png" style="width:22px;height:22px;filter:brightness(0) invert(1)" alt="">
            Se connecter avec Discord
        </a>
    </div>

    <template data-kesako-content>
        <h4>Bienvenue sur Atom !</h4>
        <p style="margin-top: var(--space-3); color: var(--text-secondary);">
            Atom est un bot Discord custom — il gère la modération, les messages de bienvenue, les rôles automatiques, les embeds personnalisés, et peut même jouer de la musique.
        </p>
        <p style="margin-top: var(--space-3); color: var(--text-secondary);">
            Ce dashboard te permet de tout configurer sans toucher à une seule commande.
        </p>
        <p style="margin-top: var(--space-3); color: var(--text-muted); font-size: var(--text-sm);">
            Tous les services VNCT sont hébergés par Leeva.
        </p>
        <hr style="margin-top: var(--space-5); border: none; border-top: 1px solid var(--border-default);">
        <p style="margin-top: var(--space-4); color: var(--text-secondary); font-weight: var(--font-medium);">🔍 Pour les curieux</p>
        <p style="margin-top: var(--space-3); color: var(--text-secondary); font-size: var(--text-sm); line-height: var(--leading-relaxed);">
            Atom tourne sur un serveur privé, sans dépendance à un service tiers payant. Les données (sanctions, configs, embeds) sont stockées localement dans une base SQLite. L'authentification passe par Discord OAuth2 — aucun mot de passe n'est stocké, on vérifie juste que tu es admin du serveur.
        </p>
        <p style="margin-top: var(--space-4); color: var(--text-muted); font-size: var(--text-sm);">
            Ce service fait partie de l'écosystème
            <a href="https://app.vena.city" style="color: var(--accent);">VenacityOS</a>.
        </p>
        <div style="margin-top: var(--space-5); display: flex; justify-content: center;">
            <button class="vnct-btn vnct-btn--primary" onclick="VNCT.Modal.close()">Compris !</button>
        </div>
    </template>

    <script src="/dashboard/js/theme.js"></script>
    <script src="/dashboard/js/vnct-common.js"></script>
    <script>
        VNCT.config.serviceName = 'Atom';
        VNCT.config.serviceVersion = '0.2.0';
        VNCT.config.discordWebhookUrl = '/api/feedback/vnct';
    </script>
    <script>
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('/dashboard/sw.js').then(function(reg) {
                reg.update();
            });
            navigator.serviceWorker.addEventListener('controllerchange', function() {
                window.location.reload();
            });
        }
    </script>
    <script>
        // Si deja connecte, rediriger vers le dashboard
        fetch('/auth/me', { credentials: 'include' })
            .then(r => r.json())
            .then(data => {
                if (data.authenticated) {
                    window.location.href = '/dashboard/app.html';
                }
            })
            .catch(() => {});
    </script>
</body>
</html>
